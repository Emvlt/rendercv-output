    projects:
      - name: " [MOIRAI ](https://moirai.up.railway.app)"
        start_date: "2026-02"
        end_date: "present"
        summary: Reduced literary analysis time from days to minutes per book by
          building MOIRAI, a novel visualization app powered by Gemini APIs to
          automatically extract character arcs.
        highlights:
          - Compiled a vector database of ~1.3K fictional character arcs by
            processing 180 books from the Gutenberg Project.
          - Full-stack development (React, VITE, FastAPI, SQLAlchemy, Pydantic)
            and deployment on Railway and Google Cloud using Docker and GitHub
            Actions. Used Gemini Python and JS API for character extraction and
            sentiment analysis.
          - Built the app in a month [in the context of the Gemini Live Agent
            Hackathon](https://devpost.com/software/moirai-e2ankb?ref_content=user-portfolio&ref_feature=in_progress).
          - Currently expanding the MOIRAI architecture by migrating
            data-ingestion microservices from Python to Go to improve concurrent
            processing speed by using a load balancer.
