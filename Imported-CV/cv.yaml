    experience:
      - company: "Kungliga Tekniska Högskolan, Department of Mathematics"
        position: "PostDoctoral Researcher"
        location: "Stockholm, Sweden"
        start_date: "2024-02"
        end_date: "2026-01"
        summary: Research on deep-learning for Computerised Tomography (CT) and
          co-developer of [ODL](https://github.com/odlgroup/odl).
        highlights:
          - Developed the [first GNN-based approach for tomographic
            imaging](https://arxiv.org/abs/2511.12730), dividing the number of
            trainable parameters by 7, the memory usage by 1.2 and the training
            time by 2.5  while achieving a  10% improvement in PSNR and SSIM
            compared to CNN benchmarks.
          - Created a [self-supervised pretraining
            scheme](https://www.aimsciences.org/article/doi/10.3934/ammc.2025012)
            that reduced the need for labeled training data by 90% while
            maintaining 98% model performance for sparse-view, low dose CT.
          - Led the architectural migration of ODL to a multi-backend system,
            reducing the time of tomographic reconstruction by a factor of 2.3
            through the removal of CPU/GPU copies. Removed manual deployment
            errors by automating a test and PyPi/ReadTheDocs deployment pipeline
            using GitHub Workflows. Shipped the first major update in 7 years.
      - company: "Cambridge University, Department of Applied Mathematics"
        position: "PostDoctoral Researcher"
        location: "Cambridge, UK"
        start_date: "2023-01"
        end_date: "2024-01"
        highlights:
          - "[Achieved an increase of 4 Dice
            score](https://www.aimsciences.org/article/doi/10.3934/ammc.2024015)
            in medical image segmentation by developing and tuning a joint
            reconstruction/segmentation scheme on a dataset of ~14K samples."
          - "[Contributed](https://iopscience.iop.org/article/10.1088/2631-8695\
            /adbb3a/meta) to open source software
            [TIGRE](https://github.com/CERN/TIGRE/tree/master) and
            [LION](https://github.com/CambridgeCIA/LION/tree/main) (PyTorch
            binders, dataloaders)."
        summary: Research on medical image segmentation and scientific software
          development.
      - company: "Bristol University, Department of Economics"
        position: "Computer Vision Engineer"
        location: "Bristol, UK"
        start_date: "2021-07"
        end_date: "2022-12"
        highlights:
          - Unlocked the ability to analyse unstructured historical documents by
            deploying a novel CV segmentation algorithm, successfully processing
            ~5K handwritten maps.
          - >
            Designed a synthetic data augmentation strategy to address class
            imbalance and utilised DVC for model versioning to prevent model
            drift.
        summary: Computer Vision engineer for the
          [MAPHIS](https://www.bristol.ac.uk/economics/research/impact-and-influence/mapping-history/)
